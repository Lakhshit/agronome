<!--
  Agronome - Unified App
  Merges: (1) the 6 farmer-facing advisory tools - now powered by live Claude
  API calls instead of static lookup tables - with (2) the Field Office CRM
  that tracks every farmer profile and every AI interaction generated.
  Data persists via window.storage.
-->
<div id="app">
  <div class="boot">Loading the field office...</div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,440..700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --soil:#241d12; --soil-2:#5c4d34;
    --field:#2c5a29; --field-deep:#152c11; --leaf:#4f8a3d;
    --wheat:#dcaa2f; --wheat-soft:#f0dca0;
    --cream:#f6f0df; --cream-2:#ece1c4; --paper:#fffcf5;
    --line:#d9caa4; --rust:#ad5029; --rust-bg:#faece3;
    --sky:#37647f; --sky-bg:#e8f1f5;
    --shadow:0 1px 0 rgba(36,29,18,.05), 0 10px 28px -14px rgba(36,29,18,.32);
    --shadow-lift:0 1px 0 rgba(36,29,18,.06), 0 18px 36px -16px rgba(36,29,18,.4);
    --font-display:"Fraunces",Georgia,"Times New Roman",serif;
    --font-body:"Inter","Helvetica Neue",Arial,sans-serif;
    --font-mono:"IBM Plex Mono","SF Mono",Consolas,monospace;
    --furrow:repeating-linear-gradient(115deg, var(--wheat) 0px, var(--wheat) 3px, transparent 3px, transparent 17px);
  }
  #app.dark{
    --soil:#ece6d8; --soil-2:#b9ae98;
    --field:#4f8a3d; --field-deep:#1d3d1c; --leaf:#6fae59;
    --wheat:#e8c24f; --wheat-soft:#8a6d1f;
    --cream:#1b1710; --cream-2:#2a251c; --paper:#221d15;
    --line:#3a3222; --rust:#d97a52; --rust-bg:#3a241c;
    --sky:#6fa8c4; --sky-bg:#1c2f38;
    --shadow:0 1px 0 rgba(0,0,0,.2), 0 10px 28px -14px rgba(0,0,0,.6);
    --shadow-lift:0 1px 0 rgba(0,0,0,.25), 0 18px 36px -16px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;}
  *:focus-visible{outline:2.5px solid var(--sky);outline-offset:2px;border-radius:4px;}
  #app{
    font-family:var(--font-body);
    color:var(--soil);
    background:radial-gradient(1200px 400px at 80% -10%, rgba(220,170,47,.13), transparent 60%), var(--cream);
    min-height:100vh; -webkit-font-smoothing:antialiased; font-size:14px;
  }
  .boot{padding:80px;text-align:center;color:var(--soil-2);font-style:italic;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  /* ---------- Masthead ---------- */
  header.top{background:linear-gradient(180deg,var(--field) 0%,var(--field-deep) 100%);color:var(--cream);padding:20px 26px 0;position:relative;}
  header.top::after{content:"";display:block;height:7px;margin-top:20px;background:var(--furrow);opacity:.9;}
  .brandrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .sprout{width:40px;height:40px;border-radius:9px;background:var(--wheat);display:grid;place-items:center;font-size:21px;flex:none;box-shadow:inset 0 -3px 0 rgba(0,0,0,.14);}
  .brandrow h1{font-family:var(--font-display);font-size:22px;letter-spacing:.1px;margin:0;font-weight:600;font-optical-sizing:auto;}
  .brandrow .sub{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1.8px;color:var(--wheat-soft);opacity:.95;}
  .modeswitch{margin-left:auto;display:flex;gap:3px;background:rgba(0,0,0,.18);padding:3px;border-radius:10px;}
  .modeswitch button{font:inherit;font-size:12.5px;font-weight:700;letter-spacing:.2px;padding:8px 14px;border:0;border-radius:8px;background:transparent;color:var(--wheat-soft);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s,color .15s;}
  .modeswitch button.active{background:var(--wheat);color:var(--field-deep);}

  nav.subnav{display:flex;gap:2px;margin-top:14px;flex-wrap:wrap;padding-bottom:0;}
  nav.subnav button{background:transparent;border:0;color:var(--wheat-soft);font:inherit;font-size:13px;font-weight:500;padding:10px 15px;cursor:pointer;border-radius:8px 8px 0 0;border-bottom:3px solid transparent;letter-spacing:.2px;display:flex;align-items:center;gap:6px;transition:background .15s,color .15s,border-color .15s;}
  nav.subnav button:hover{color:#fff;background:rgba(255,255,255,.06);}
  nav.subnav button.active{background:var(--cream);color:var(--field-deep);font-weight:600;border-bottom:3px solid var(--cream);}

  /* ---------- Farmer context bar ---------- */
  .ctxbar{background:var(--wheat-soft);border-bottom:1px solid var(--line);padding:9px 26px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12.5px;}
  .lang-bar{padding:8px 26px 0;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--wheat-soft);}
  .lang-lab{text-transform:uppercase;letter-spacing:.6px;font-size:10px;opacity:.85;}
  .lang-bar select{font:inherit;font-size:11.5px;padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;}
  .lang-bar select option{color:#111;}
  .ctxbar .lab{font-weight:700;color:var(--field-deep);text-transform:uppercase;letter-spacing:.8px;font-size:10.5px;}
  .ctxbar select{font:inherit;font-size:12.5px;padding:5px 9px;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--soil);max-width:260px;}
  .ctxbar .hint{color:var(--soil-2);font-style:italic;}
  .ctxbar .btn.tiny{padding:5px 10px;font-size:11.5px;}

  /* ---------- Layout ---------- */
  main{padding:24px 26px 60px;max-width:1180px;margin:0 auto;}
  .view,.panel{display:none;animation:fade .25s ease;}
  .view.active,.panel.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .eyebrow{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1.8px;color:var(--leaf);font-weight:600;margin:0 0 4px;}
  h2.viewtitle{font-family:var(--font-display);font-size:25px;margin:0 0 2px;font-weight:600;color:var(--soil);letter-spacing:.1px;}
  .viewnote{color:var(--soil-2);font-size:13.5px;margin:0 0 20px;}

  /* ---------- Stat cards (dashboard) ---------- */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px;}
  .stat{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .stat::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--furrow);}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:1.3px;color:var(--soil-2);font-weight:600;}
  .stat .v{font-family:var(--font-mono);font-size:27px;font-weight:600;color:var(--field-deep);line-height:1.1;margin-top:7px;letter-spacing:-.5px;}
  .stat .d{font-size:11.5px;color:var(--leaf);margin-top:3px;font-weight:600;}

  .panelgrid{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;}
  .panelgrid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
  @media(max-width:860px){.panelgrid2{grid-template-columns:1fr;}}
  .donut-wrap{display:flex;align-items:center;gap:18px;}
  .donut-legend{list-style:none;margin:0;padding:0;font-size:12.5px;flex:1;}
  .donut-legend li{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .donut-legend .sw{width:10px;height:10px;border-radius:3px;flex:none;}
  .donut-legend .n{margin-left:auto;font-weight:700;color:var(--soil);}
  .trendchart{width:100%;height:auto;}
  .insight-card{background:linear-gradient(135deg,var(--field),var(--field-deep));border-radius:12px;padding:18px 20px;margin-bottom:20px;color:var(--cream);box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .insight-card::before{content:"";position:absolute;inset:0;background:var(--furrow);opacity:.05;pointer-events:none;}
  .insight-card h3{margin:0 0 4px;font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--wheat-soft);font-weight:600;}
  .insight-card p.sub{margin:0 0 12px;font-size:12.5px;color:var(--wheat-soft);opacity:.9;}
  .insight-body{display:none;margin-top:12px;background:rgba(255,255,255,.08);border-radius:9px;padding:14px 16px;font-size:13px;line-height:1.7;}
  .insight-body .hl{margin-top:8px;padding-left:18px;}
  .insight-body .hl li{margin-bottom:5px;}
  th.sortable{cursor:pointer;user-select:none;}
  th.sortable:hover{color:var(--soil);}
  th.sortable .arrow{opacity:.55;margin-left:3px;}
  .panel-box{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);}
  .panel-box h3{margin:0 0 14px;font-size:12.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--soil-2);font-weight:700;}
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:11px;font-size:13px;}
  .bar .lab{width:120px;flex:none;color:var(--soil);font-weight:normal;text-transform:none;letter-spacing:0;font-size:13px;}
  .bar .track{flex:1;height:9px;background:var(--cream-2);border-radius:99px;overflow:hidden;}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--leaf),var(--field));border-radius:99px;}
  .bar .num{width:30px;text-align:right;font-variant-numeric:tabular-nums;color:var(--soil-2);font-weight:600;}
  .feed{list-style:none;margin:0;padding:0;}
  .feed li{display:flex;gap:11px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13px;}
  .feed li:last-child{border-bottom:0;}
  .feed .ic{width:26px;height:26px;border-radius:7px;background:var(--cream-2);display:grid;place-items:center;font-size:14px;flex:none;}
  .feed .who{font-weight:600;color:var(--soil);}
  .feed .meta{color:var(--soil-2);font-size:12px;}

  /* ---------- Toolbar / table (CRM) ---------- */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .toolbar input[type=search],.toolbar select{font:inherit;font-size:13px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--soil);transition:border-color .12s;}
  .toolbar input[type=search]:focus,.toolbar select:focus{border-color:var(--leaf);}
  .toolbar input[type=search]{min-width:220px;}
  .toolbar .spacer{flex:1;}
  .btn{font:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:9px 16px;border-radius:9px;border:1px solid transparent;}
  .btn.primary{background:linear-gradient(180deg,var(--field) 0%,var(--field-deep) 100%);color:var(--cream);transition:transform .12s,box-shadow .12s,background .15s;box-shadow:0 1px 0 rgba(255,255,255,.08) inset;}
  .btn.primary:hover{background:linear-gradient(180deg,#356b31 0%,var(--field-deep) 100%);transform:translateY(-1px);box-shadow:0 6px 14px -6px rgba(21,44,17,.5);}
  .btn.primary:active{transform:translateY(0);}
  .btn.primary:disabled{background:var(--cream-2);color:var(--soil-2);cursor:not-allowed;}
  .btn.ghost{background:transparent;border-color:var(--line);color:var(--soil);transition:background .12s,border-color .12s;}
  .btn.ghost:hover{background:var(--cream-2);border-color:var(--soil-2);}
  .btn.tiny{padding:5px 10px;font-size:12px;}
  .tablewrap{background:var(--paper);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;background:var(--cream-2);color:var(--soil-2);font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line);}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:0;}
  tbody tr.clickable{cursor:pointer;}
  tbody tr.clickable:hover{background:var(--cream);box-shadow:inset 3px 0 0 var(--leaf);}
  tbody tr.clickable{transition:background .12s,box-shadow .12s;}
  .who-cell{display:flex;align-items:center;gap:10px;}
  .avatar{width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:var(--font-mono);font-size:11.5px;font-weight:600;color:#fff;background:var(--leaf);}
  .muted{color:var(--soil-2);}
  .empty{padding:40px;text-align:center;color:var(--soil-2);font-style:italic;}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-family:var(--font-mono);font-size:10.5px;font-weight:600;letter-spacing:.4px;}
  .pill.new{background:#eef6e9;color:var(--field);}
  .pill.active{background:#fdf3d6;color:#8a6d12;}
  .pill.lead{background:#f7e3d8;color:var(--rust);}
  .pill.dormant{background:#ececec;color:#777;}
  .tool-tag{display:inline-block;padding:3px 9px;border-radius:6px;font-family:var(--font-mono);font-size:10.5px;font-weight:600;background:var(--cream-2);color:var(--soil-2);}
  .ai-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px;background:var(--field);color:var(--cream);margin-left:6px;vertical-align:middle;}

  /* ---------- Drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(43,36,23,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(520px,94vw);background:var(--cream);box-shadow:-12px 0 40px -10px rgba(0,0,0,.4);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column;}
  .drawer.show{transform:none;}
  .drawer .dhead{background:linear-gradient(180deg,var(--field),var(--field-deep));color:var(--cream);padding:22px 24px;position:relative;}
  .drawer .dhead .x{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.12);border:0;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;}
  .drawer .dhead h3{margin:0;font-family:var(--font-display);font-size:22px;font-weight:600;}
  .drawer .dhead .farm{font-size:13px;color:var(--wheat-soft);margin-top:3px;}
  .dbody{padding:22px 24px;overflow-y:auto;flex:1;}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:6px 14px;font-size:13px;margin-bottom:18px;}
  .kv dt{color:var(--soil-2);font-weight:600;}
  .kv dd{margin:0;color:var(--soil);}
  .dbody h4{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--leaf);margin:20px 0 10px;border-top:1px solid var(--line);padding-top:14px;}
  .timeline{list-style:none;margin:0;padding:0;}
  .timeline li{position:relative;padding:0 0 15px 22px;border-left:2px solid var(--line);}
  .timeline li:last-child{border-left-color:transparent;padding-bottom:0;}
  .timeline .dot{position:absolute;left:-7px;top:2px;width:12px;height:12px;border-radius:50%;background:var(--wheat);border:2px solid var(--cream);}
  .timeline .t-tool{font-weight:700;font-size:12.5px;color:var(--soil);}
  .timeline .t-date{font-size:11.5px;color:var(--soil-2);}
  .timeline .t-detail{font-size:12.5px;color:var(--soil-2);margin-top:3px;line-height:1.5;}

  /* ---------- Modal form ---------- */
  .modal{position:fixed;inset:0;display:none;place-items:center;z-index:60;padding:16px;}
  .modal.show{display:grid;}
  .modal .card{background:var(--cream);border-radius:14px;width:min(560px,94vw);max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.55);border:1px solid var(--line);}
  .modal .mhead{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;}
  .modal .mhead h3{margin:0;font-family:var(--font-display);font-size:19px;font-weight:600;}
  .modal .mhead button{margin-left:auto;background:none;border:0;font-size:20px;cursor:pointer;color:var(--soil-2);}
  .mbody{padding:20px 22px;}
  .mfoot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--soil-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
  .field input,.field select,.field textarea{width:100%;font:inherit;font-size:13.5px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--soil);transition:border-color .12s,box-shadow .12s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--leaf);box-shadow:0 0 0 3px rgba(79,138,61,.13);}
  .field textarea{resize:vertical;min-height:64px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:520px){.row2{grid-template-columns:1fr;}}

  /* ---------- Copilot: home + tool grid ---------- */
  .home-hero{background:linear-gradient(135deg,var(--field),var(--field-deep));border-radius:14px;padding:26px 24px;margin-bottom:18px;position:relative;overflow:hidden;color:var(--cream);}
  .home-hero::before{content:"";position:absolute;inset:0;background:var(--furrow);opacity:.06;pointer-events:none;}
  .home-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:220px;height:220px;background:rgba(255,255,255,.06);border-radius:50%;}
  .home-hero-tag{display:inline-block;background:var(--wheat);color:var(--field-deep);font-family:var(--font-mono);font-size:10.5px;font-weight:600;padding:4px 11px;border-radius:20px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
  .home-hero-title{font-family:var(--font-display);font-size:27px;font-weight:600;line-height:1.28;margin-bottom:7px;position:relative;letter-spacing:.1px;}
  .home-hero-desc{font-size:13px;color:var(--wheat-soft);line-height:1.6;position:relative;max-width:560px;}
  .tool-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  @media(max-width:700px){.tool-grid{grid-template-columns:1fr 1fr;}}
  .tool-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:7px;box-shadow:var(--shadow);}
  .tool-card:hover{border-color:var(--leaf);background:var(--cream-2);transform:translateY(-2px);box-shadow:var(--shadow-lift);}
  .tool-card{transition:transform .15s,box-shadow .15s,border-color .15s,background .15s;}
  .tool-icon{font-size:21px;line-height:1;}
  .tool-name{font-size:13px;font-weight:700;color:var(--soil);line-height:1.3;}
  .tool-desc{font-size:11.5px;color:var(--soil-2);line-height:1.5;}
  .tool-arrow{font-size:11.5px;color:var(--leaf);margin-top:auto;font-weight:600;}

  /* ---------- Copilot: tool cards / forms ---------- */
  .toolcard{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
  .toolcard-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line);}
  .toolcard-icon{width:38px;height:38px;border-radius:8px;background:var(--cream-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .toolcard-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--soil);}
  .toolcard-sub{font-size:12px;color:var(--soil-2);margin-top:2px;}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:500px){.field-grid{grid-template-columns:1fr;}}

  .symptom-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
  @media(max-width:500px){.symptom-grid{grid-template-columns:1fr 1fr;}}
  .symptom-btn{padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;background:var(--paper);cursor:pointer;font-size:12px;color:var(--soil-2);text-align:center;transition:all .15s;line-height:1.3;}
  .symptom-btn:hover{border-color:var(--leaf);background:var(--cream-2);}
  .symptom-btn.selected{border-color:var(--field);background:var(--cream-2);color:var(--field-deep);font-weight:700;}
  .symptom-icon{font-size:17px;display:block;margin-bottom:4px;}

  .result-box{background:var(--cream-2);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-top:14px;display:none;}
  .result-print-btn{display:block;margin:14px 0 0 auto;}
  .result-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
  .result-actions .btn{margin:0;}
  .mic-btn.listening{background:var(--rust);color:#fff;border-color:var(--rust);}
  .result-tag{display:inline-block;background:var(--field);color:var(--cream);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
  .result-text{font-size:13px;color:var(--soil);line-height:1.85;}
  .result-text p{margin-bottom:8px;}
  .result-text p:last-child{margin-bottom:0;}

  async function askAI(system, user){
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 12000);
    let response;
    try{
      response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: controller.signal,
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 1000,
          system: system,
          messages: [{ role: "user", content: user }]
        })
      });
    }catch(fetchErr){
      if(fetchErr && fetchErr.name === "AbortError") throw new Error("Failed to fetch: request timed out after 12 seconds");
      throw fetchErr;
    }finally{
      clearTimeout(timeoutId);
    }
    if(!response.ok){
      let detail = "";
      try{ const errJson = await response.json(); detail = errJson && errJson.error ? (errJson.error.message||JSON.stringify(errJson.error)) : JSON.stringify(errJson); }
      catch(e2){ try{ detail = await response.text(); }catch(e3){ detail = ""; } }
      throw new Error("API error " + response.status + (detail ? ": " + detail : ""));
    }
    const data = await response.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    if(!text) throw new Error("Empty response from advisor (no text content returned)");
    return text;
  }
  function parseAIJSON(text){
    let clean = text.replace(/```json/gi,"").replace(/```/g,"").trim();
    const start = clean.indexOf("{"); const end = clean.lastIndexOf("}");
    if(start>=0 && end>start) clean = clean.slice(start, end+1);
    try{ return JSON.parse(clean); }
    catch(e){ throw new Error("Could not parse advisor response as JSON: " + e.message + " - raw: " + text.slice(0,200)); }
  }

  function fallbackDiarySummary(entries){
    const text = entries.join(" ").toLowerCase();
    const crops = ["wheat","rice","corn","maize","potato","tomato","cotton","soybean","onion"].filter(c=>text.includes(c));
    const flags = [];
    if(text.includes("yellow")||text.includes("pest")||text.includes("insect")||text.includes("disease")) flags.push("a possible pest or nutrient issue was noted");
    if(text.includes("dry")||text.includes("no rain")) flags.push("dry conditions came up more than once");
    if(text.includes("rain")||text.includes("irrigat")) flags.push("watering has been kept up");
    const summary = `Over your last ${entries.length} entries${crops.length?" on "+crops.join(", "):""}, things look ${flags.length?"mostly on track, with a couple of points worth watching":"steady"}.` +
      (flags.length ? " Specifically: " + flags.join("; ") + "." : " Keep logging regularly to build a clear picture over the season.");
    return { summary, suggestion: "Review any entries mentioning pests, disease or dry soil first, since those are the ones most likely to need action this week." };

  function renderStatusDonut(farmers){
    const el = $("#status-donut"); if(!el) return;
    const keys = Object.keys(STATUS);
    const counts = keys.map(k=>farmers.filter(f=>f.status===k).length);
    const total = Math.max(1, farmers.length);
    const R=42, C=2*Math.PI*R;
    let offset=0;
    const segs = keys.map((k,idx)=>{
      const n = counts[idx];
      const frac = n/total;
      const dash = frac*C;
      const seg = `<circle r="${R}" cx="60" cy="60" fill="transparent" stroke="${STATUS_COLOR[k]}" stroke-width="16" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 60 60)"/>`;
      offset += dash;
      return seg;
    }).join("");
    el.innerHTML = `<svg viewBox="0 0 120 120" width="120" height="120">${segs}<circle r="26" cx="60" cy="60" fill="var(--paper)"/><text x="60" y="55" text-anchor="middle" font-size="20" font-weight="700" fill="var(--soil)">${farmers.length}</text><text x="60" y="70" text-anchor="middle" font-size="9" fill="var(--soil-2)">farmers</text></svg>`;
    $("#status-legend").innerHTML = keys.map((k,idx)=>`<li><span class="sw" style="background:${STATUS_COLOR[k]}"></span>${STATUS[k].label}<span class="n">${counts[idx]}</span></li>`).join("");
  }

  function renderTrendChart(ix){
    const el = $("#trend-chart"); if(!el) return;
    const months = [];
    const now = new Date();
    for(let i=5;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      months.push({key: d.toISOString().slice(0,7), label: d.toLocaleDateString("en-GB",{month:"short"})});
    }
    const counts = months.map(m => ix.filter(i=>i.date.startsWith(m.key)).length);
    const max = Math.max(1, ...counts);
    const w=280,h=110,bw=32,gap=14,base=90;
    const bars = counts.map((n,idx)=>{
      const bh = Math.round((n/max)*70);
      const x = 10 + idx*(bw+gap);
      return `<rect x="${x}" y="${base-bh}" width="${bw}" height="${bh}" rx="4" fill="var(--leaf)"/><text x="${x+bw/2}" y="${base-bh-6}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--soil)">${n}</text><text x="${x+bw/2}" y="${base+16}" text-anchor="middle" font-size="10" fill="var(--soil-2)">${months[idx].label}</text>`;
    }).join("");
    el.innerHTML = `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" class="trendchart">${bars}</svg>`;
  }
  function renderGrowthChart(farmers){
    const el = $("#growth-chart"); if(!el) return;
    const months = [];
    const now = new Date();
    for(let i=5;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      months.push({key: d.toISOString().slice(0,7), label: d.toLocaleDateString("en-GB",{month:"short"})});
    }
    let running = 0;
    const cumulative = months.map(m => {
      running += farmers.filter(f=>(f.joined||"").startsWith(m.key)).length;
      return running;
    });
    const max = Math.max(1, ...cumulative);
    const w=280, h=110, left=10, right=270, top=14, base=90;
    const stepX = (right-left) / Math.max(1, cumulative.length-1);
    const pts = cumulative.map((n,idx)=>{
      const x = left + idx*stepX;
      const y = base - (n/max)*(base-top);
      return {x,y,n};
    });
    const path = pts.map((p,i)=> (i===0?"M":"L") + p.x.toFixed(1) + " " + p.y.toFixed(1)).join(" ");
    const area = path + ` L${pts[pts.length-1].x.toFixed(1)} ${base} L${pts[0].x.toFixed(1)} ${base} Z`;
    const dots = pts.map((p,idx)=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="var(--field)"/><text x="${p.x.toFixed(1)}" y="${(p.y-8).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--soil)">${p.n}</text><text x="${p.x.toFixed(1)}" y="${base+16}" text-anchor="middle" font-size="10" fill="var(--soil-2)">${months[idx].label}</text>`).join("");
    el.innerHTML = `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" class="trendchart">
      <path d="${area}" fill="var(--leaf)" opacity="0.15"/>
      <path d="${path}" fill="none" stroke="var(--field)" stroke-width="2"/>
      ${dots}
    </svg>`;
  }

  function fallbackPortfolioInsights(f, ix, toolCounts){
    const dormant = f.filter(x=>x.status==="dormant");
    const leads = f.filter(x=>x.status==="lead");
    const topTool = Object.keys(toolCounts).sort((a,b)=>toolCounts[b]-toolCounts[a])[0];
    const summary = `Across ${f.length} farmers and ${ix.length} logged interactions, ${TOOLS[topTool]?TOOLS[topTool].label:topTool} is the most-used tool. ${leads.length} farmer(s) are qualified leads and ${dormant.length} are currently dormant.`;
    const highlights = [
      dormant.length ? `Re-engage ${dormant.length} dormant farmer(s), starting with ${dormant[0].name}.` : "No dormant farmers right now - engagement is holding up well.",
      leads.length ? `Follow up on ${leads.length} qualified lead(s) for potential dealer hand-off.` : "No qualified leads waiting on follow-up at the moment.",
      `${TOOLS[topTool]?TOOLS[topTool].label:topTool} is driving the most usage - consider it a template for promoting the other tools.`,
    ];
    return { summary, highlights };
  }
  async function runPortfolioInsights(){
    const f = DB.farmers, ix = DB.interactions;
    if(!f.length){ alert("Add some farmers first."); return; }
    $("#pi-btn").disabled = true;
    const toolCounts = {};
    Object.keys(TOOLS).forEach(k=>toolCounts[k]=ix.filter(i=>i.tool===k).length);
    const fb = fallbackPortfolioInsights(f, ix, toolCounts);
    $("#pi-body").style.display = "block";
    setHTML("pi-body", `<p>${esc(fb.summary)}</p><ul class="hl">${fb.highlights.map(h=>`<li>${esc(h)}</li>`).join("")}</ul>`);
    showRefining("pi-body");
    try{
      const roster = f.map(x=>`${x.name} (${x.status}, ${x.crop}, ${x.region}, ${ixFor(x.id).length} interactions)`).join("; ");
      const sys = sysPrefix() + 'Schema: {"summary":string,"highlights":[string,string,string]}';
      const user = `Portfolio of ${f.length} farmers on Agronome: ${roster}.\nTool usage counts: ${JSON.stringify(toolCounts)}.\nTotal interactions: ${ix.length}.\nWrite a short strategic summary of how this farmer portfolio is doing (adoption, engagement, standout crops or regions), then 3 short highlight/action bullets a customer-success manager should act on (e.g. dormant farmers to re-engage, leads to convert, most-used tool).`;
      const raw = await askAI(sys, user);
      const d = parseAIJSON(raw);
      clearRefining("pi-body");
      setHTML("pi-body", `<p>${esc(d.summary||"")}</p>` + (d.highlights&&d.highlights.length ? `<ul class="hl">${d.highlights.map(h=>`<li>${esc(h)}</li>`).join("")}</ul>` : ""));
    }catch(e){ console.error(e); clearRefining("pi-body"); }

  }

  function downloadBlob(filename, text, mime){

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }

  function renderFarmers(){

      else { av=(a[field]||"").toString().toLowerCase(); bv=(b[field]||"").toString().toLowerCase(); }
      return av<bv ? -1*dir : av>bv ? 1*dir : 0;
    });

      size: $("#nf-size").value.trim() || " - ",
      soil: $("#nf-soil").value.trim() || " - ",
      water: $("#nf-water").value.trim() || " - ",
      phone: $("#nf-phone").value.trim() || " - ",
      status: $("#nf-status").value,
    };
    let id = editingId;
    if(editingId){
      const f = DB.farmers.find(x=>x.id===editingId);
      if(f) Object.assign(f, fields);
    } else {
      id = "F-"+(1048+DB.farmers.length);
      DB.farmers.push({ id, ...fields, joined: todayISO() });
    }
    await save();
    ["nf-name","nf-region","nf-crop","nf-size","nf-soil","nf-water","nf-phone"].forEach(i=>$("#"+i).value="");
    closeModals(); renderFarmers(); renderDash(); populateFarmerSelect();
    if(editingId){ showToast("Farmer updated."); if($("#drawer").classList.contains("show")) openDrawer(editingId); }
    else { currentFarmerId = id; $("#ctx-farmer").value = id; renderCtxHint(); showToast("Farmer added."); }
  }
  async function deleteFarmer(id){
    const f = DB.farmers.find(x=>x.id===id); if(!f) return;
    if(!confirm(`Delete ${f.name}? This will also remove their ${ixFor(id).length} logged interaction(s). This cannot be undone.`)) return;
    DB.farmers = DB.farmers.filter(x=>x.id!==id);
    DB.interactions = DB.interactions.filter(i=>i.farmerId!==id);
    if(currentFarmerId === id) currentFarmerId = null;
    await save();
    closeDrawer();
    renderFarmers(); renderDash(); renderLog(); populateFarmerSelect(); renderCtxHint();
    showToast(`${f.name} was deleted.`);
  }
  async function addLog(){
    const farmerId = $("#lg-farmer").value;
    const detail = $("#lg-detail").value.trim();
    if(!detail){ $("#lg-detail").focus(); return; }
    const q = $("#lg-quality").value;
    DB.interactions.push({ id:"IX-"+(2000+DB.interactions.length), farmerId, tool:$("#lg-tool").value, date:$("#lg-date").value||todayISO(), detail, quality:q?parseInt(q):null });
    await save();
    $("#lg-detail").value = "";
    closeModals(); renderLog(); renderDash(); renderFarmers();
    if($("#drawer").classList.contains("show")) openDrawer(farmerId);
  }

  function populateFarmerSelect(){
    const sel = $("#ctx-farmer");
    if(!sel) return;
    const prev = sel.value;
    sel.innerHTML = '<option value="">-- Guest / no farmer selected --</option>' +
      DB.farmers.map(f=>`<option value="${f.id}">${esc(f.name)} (${f.id})</option>`).join("");
    sel.value = prev || currentFarmerId || "";
  }
  function renderCtxHint(){
    const hint = $("#ctx-hint");
    if(!hint) return;
    if(currentFarmerId){

    $$(".modepanel").forEach(v=>v.classList.remove("active"));

      const errEl = $("#login-farmer-err");
      errEl.textContent = "";
      if(!id){ errEl.textContent = "Please choose your name from the list."; return; }
      await loginAsFarmer(id);
    };
    $("#login-nf-btn").onclick = async ()=>{
      const name = $("#login-nf-name").value.trim();
      const pw = $("#login-nf-pw").value;
      const pw2 = $("#login-nf-pw2").value;
      const errEl = $("#login-nf-err");
      errEl.textContent = "";
      if(!name){ $("#login-nf-name").focus(); return; }
      if(!pw || pw.length < 4){ errEl.textContent = "Please choose a password of at least 4 characters."; return; }
      if(pw !== pw2){ errEl.textContent = "Passwords don't match."; return; }
      const id = "F-"+(1054+DB.farmers.length);
      DB.farmers.push({
        id, name,
        region: $("#login-nf-region").value.trim() || " - ",
        crop: $("#login-nf-crop").value.trim() || " - ",
        size: $("#login-nf-size").value.trim() || " - ",
        soil: $("#login-nf-soil").value.trim() || " - ",
        water: " - ",
        phone: $("#login-nf-phone").value.trim() || " - ",
        password: pw,
        status: "new",
        joined: todayISO()
      });
      await save();
      await loginAsFarmer(id);
    };
    $("#login-staff-link").onclick = ()=>{
      const f = $("#login-staff-form");
      f.style.display = f.style.display === "none" ? "block" : "none";
    };
    $("#login-staff-btn").onclick = async ()=>{
      const name = $("#login-staff-name").value.trim();
      const pw = $("#login-staff-pw").value;
      const errEl = $("#login-staff-err");
      errEl.textContent = "";
      if(!name){ $("#login-staff-name").focus(); return; }
      if(pw !== STAFF_PASSCODE){ errEl.textContent = "Incorrect access code."; return; }
      await loginAsStaff(name);
    };
  }
  function loginTab(which){
    $$(".login-tab").forEach(b=>b.classList.remove("active"));
    $$(".login-pane").forEach(p=>p.classList.remove("active"));
    $("#login-tab-"+which).classList.add("active");
    $("#login-pane-"+which).classList.add("active");
  }
  async function loginAsFarmer(id){
    session = { type:"farmer", farmerId:id };
    currentFarmerId = id;
    await saveSession();
    await render();
  }
  async function loginAsStaff(name){
    session = { type:"staff", staffName:name };
    currentFarmerId = null;
    await saveSession();
    await render();
  }
  async function logout(){
    if(!confirm("Log out?")) return;
    session = null;
    currentFarmerId = null;
    await saveSession();
    await render();
  }
  async function render(){
    if(!session){ buildLogin(); applyTheme(); return; }
    buildApp();
    renderDash(); renderFarmers(); renderLog();
    if(session.type === "staff"){ showMode("fieldoffice"); }
    applyTheme();
  }

  /* ---------- public surface for inline handlers ---------- */
  window.FC = {
    showMode, showTool, showCRM, openFarmerModal, openEditFarmerModal, deleteFarmer, onCtxChange, logout, loginTab,
    runCrop, runFert, runProfit, runDisease, runWeather, addEntry, runDiarySummary, selectSym, runCompare,
    onDiseasePhoto, clearDiseasePhoto, readAloud, toggleVoiceInput, shareResult,
    runPortfolioInsights, sortFarmers, sortLog, exportFarmersCSV, exportLogCSV, exportFarmerReport,
    printFarmerReport, printFarmersList, printLog, printToolResult, printDashboard, toggleTheme, setLanguage
  };

  /* ---------- init ---------- */
  (async function(){
    await load();
    await loadSession();
    await loadPrefs();
    await render();
    applyTheme();
  })();
})();
</script>
